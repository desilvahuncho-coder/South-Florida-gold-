<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Florida Gold - Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
<style>
body { background:#000; color:#b76e79; font-family: Arial,sans-serif; margin:0; padding:0; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 10%; background:#000; border-bottom:2px solid #b76e79; position:sticky; top:0; z-index:100; }
header .logo { font-family: 'Impact', sans-serif; font-size:22px; letter-spacing:2px; color:#b76e79; }
nav ul { list-style:none; display:flex; gap:15px; }
nav ul li a { color:#b76e79; text-decoration:none; font-size:16px; transition:0.3s; }
nav ul li a:hover { color:#ffdde1; transform:scale(1.1); }

main { padding:50px 10%; display:grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap:20px; }

.card { background:#111; border-radius:10px; overflow:hidden; cursor:pointer; transition:0.3s; }
.card img { width:100%; display:block; }
.card:hover { transform:scale(1.05); }

footer { text-align:center; padding:30px 10%; border-top:2px solid #b76e79; color:#b76e79; }

@media(max-width:768px) { header{flex-direction:column;gap:10px;} nav ul{flex-direction:column;gap:10px;} }
</style>
</head>
<body>

<header>
  <div class="logo">south florida</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="catalogue.html">View Catalogue</a></li>
      <li><a href="book.html">Book Appointment</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="card"><img src="https://via.placeholder.com/250x300" alt="Gold Piece 1"></div>
  <div class="card"><img src="https://via.placeholder.com/250x350" alt="Gold Piece 2"></div>
  <div class="card"><img src="https://via.placeholder.com/250x250" alt="Gold Piece 3"></div>
  <div class="card"><img src="https://via.placeholder.com/250x400" alt="Gold Piece 4"></div>
  <div class="card"><img src="https://via.placeholder.com/250x300" alt="Gold Piece 5"></div>
  <div class="card"><img src="https://via.placeholder.com/250x350" alt="Gold Piece 6"></div>
</main>

<footer>
  &copy; 2026 South Florida Gold. All rights reserved.
</footer>

</body>
</html>
