<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:url('clouds-background.jpg') center/cover fixed;
}

.header {
  position:sticky;
  top:0;
  background:#f0f0f0;
  text-align:center;
}

.header-bar { background:#ccc; padding:5px; }

.brand {
  font-size:36px;
  color:#5DADE2;
  text-shadow:1px 1px 2px #000;
}

.karats { margin-bottom:10px; }

.section {
  max-width:1100px;
  margin:40px auto;
  text-align:center;
}

.section h2::after {
  content:"";
  display:block;
  width:60px;
  height:2px;
  background:gold;
  margin:10px auto;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.grid img, .grid video {
  width:100%;
  display:block;
}

.feature { margin:15px 0; }

.feature video, .feature img {
  width:100%;
  max-width:700px;
}

@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-bar">Call: 11502 N Nebraska Ave Suite 104, Tampa, Florida</div>
  <div class="brand">South Florida Gold</div>
  <div class="karats">14k | 16k | 22k</div>
</div>

<!-- GRILL -->
<div class="section">
<h2>Grill</h2>

<div class="grid">
<img src="grill1.jpg">
<img src="grill2.jpg">
<img src="grill3.jpg">
<img src="grill4.jpg">
</div>

<div class="feature">
<video autoplay muted loop controls><source src="grill-feature1.mp4"></video>
</div>

<div class="grid">
<img src="grill5.jpg">
<img src="grill6.jpg">
<img src="grill7.jpg">
<img src="grill8.jpg">
</div>

<div class="feature">
<video autoplay muted loop controls><source src="grill-feature2.mp4"></video>
</div>

<div class="grid">
<img src="grill9.jpg">
<img src="grill10.jpg">
</div>

</div>

<!-- OTHER SECTIONS SAME STRUCTURE -->
<div class="section">
<h2>Iced Out</h2>
<div class="grid">
<img src="iced1.jpg">
<img src="iced2.jpg">
</div>
<div class="feature"><img src="iced-feature1.jpg"></div>
</div>

<div class="section">
<h2>Custom</h2>
<div class="grid">
<img src="custom1.jpg">
<img src="custom2.jpg">
</div>
<div class="feature"><img src="custom-feature1.jpg"></div>
</div>

<div class="section">
<h2>Cubam Collection</h2>
<div class="grid">
<img src="cubam-bracelet1.jpg">
<img src="cubam-chain1.jpg">
<img src="cubam-ring1.jpg">
<img src="cubam-ring2.jpg">
</div>
<div class="feature"><img src="cubam-feature1.jpg"></div>
</div>

<div class="section">
<h2>Customer Service</h2>
<div class="grid">
<video autoplay muted loop controls><source src="CS1.mp4"></video>
<video autoplay muted loop controls><source src="CS2.mp4"></video>
<video autoplay muted loop controls><source src="CS3.mp4"></video>
<video autoplay muted loop controls><source src="CS4.mp4"></video>
</div>
</div>

</body>
           </html>
