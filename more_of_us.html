<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Of Us - South Florida Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{ background:url('clouds.jpg') center/cover no-repeat; color:#fff; position:relative; font-family:'Montserrat', sans-serif; }
.overlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.1); z-index:-1; }

/* Header */
header{ position:sticky; top:0; background:rgba(0,0,0,0.6); color:#d4af37; font-family:'Playfair Display', serif; font-size:28px; text-align:center; padding:22px 0; letter-spacing:2px; border-bottom:1px solid #d4af37; box-shadow:0 6px 20px rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index:100; }
header:hover{ color:#f2d47a; transition:0.5s ease; }

/* Grid */
.grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:20px; margin:40px auto; max-width:1200px; }
.grid-item img{ width:100%; display:block; transition: transform 0.5s, filter 0.5s; border-radius:5px; }
.grid-item:hover img{ transform:scale(1.05); filter:brightness(1.1); }
.grid-desc{ text-align:center; margin-top:8px; font-size:14px; color:#fff; }

/* Featured images/videos */
.feature{ width:90%; margin:40px auto; display:block; border-radius:5px; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
.feature video{ width:100%; border-radius:5px; }

/* Category headers */
.category-header{ text-align:center; font-family:'Playfair Display', serif; font-size:28px; margin:40px 0 10px 0; position:relative; }
.category-header::after{ content:""; display:block; width:100px; height:1px; background:#d4af37; margin:8px auto 0 auto; opacity:0.8; }

/* Videos in category */
.scroll-video{ width:90%; margin:20px auto; border-radius:5px; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
.scroll-video video{ width:100%; border-radius:5px; }

/* Footer */
footer{ text-align:center; padding:40px 0; position:relative; margin-top:60px; }
footer::before{ content:""; display:block; width:100px; height:1px; background:#d4af37; margin:0 auto 20px auto; opacity:0.8; }
footer .payments img{ width:50px; margin:0 10px; vertical-align:middle; }
footer .more-btn{ display:inline-block; margin-top:20px; padding:12px 24px; background:#d4af37; color:#000; font-weight:bold; border-radius:5px; text-decoration:none; transition:background 0.3s; }
footer .more-btn:hover{ background:#f2d47a; }

/* Responsive */
@media(max-width:768px){ .grid{ grid-template-columns:1fr; } header{ font-size:24px; padding:18px 0; } .category-header{ font-size:24px; } }
</style>
</head>
<body>
<div class="overlay"></div>

<header>South Florida Gold</header>

<!-- Cuban Category -->
<h2 class="category-header">Cuban Chains & Rings</h2>
<div class="grid">
  <div class="grid-item"><img src="images/cubam-chain1.jpg"><div class="grid-desc">Cuban Chain 1</div></div>
  <div class="grid-item"><img src="images/cubam-chain2.jpg"><div class="grid-desc">Cuban Chain 2</div></div>
  <div class="grid-item"><img src="images/cubam-ring1.jpg"><div class="grid-desc">Cuban Ring 1</div></div>
  <div class="grid-item"><img src="images/cubam-ring2.jpg"><div class="grid-desc">Cuban Ring 2</div></div>
  <div class="grid-item"><img src="images/cubam-bracelet1.jpg"><div class="grid-desc">Bracelet 1</div></div>
</div>
<img class="feature" src="images/cubam-feature1.jpg">

<!-- Grills Category -->
<h2 class="category-header">Grills</h2>
<div class="grid">
  <div class="grid-item"><img src="images/grill1.jpg"><div class="grid-desc">Grill 1</div></div>
  <div class="grid-item"><img src="images/grill2.jpg"><div class="grid-desc">Grill 2</div></div>
  <div class="grid-item"><img src="images/grill3.jpg"><div class="grid-desc">Grill 3</div></div>
  <div class="grid-item"><img src="images/grill4.jpg"><div class="grid-desc">Grill 4</div></div>
  <div class="grid-item"><img src="images/grill5.jpg"><div class="grid-desc">Grill 5</div></div>
</div>
<img class="feature" src="images/grill-feature1.jpg">

<!-- Iced Out Category -->
<h2 class="category-header">Iced Out</h2>
<div class="grid">
  <div class="grid-item"><img src="images/iced1.jpg"><div class="grid-desc">Iced Watch</div></div>
  <div class="grid-item"><img src="images/iced2.jpg"><div class="grid-desc">Iced Teeth</div></div>
</div>
<img class="feature" src="images/iced-feature1.jpg">

<!-- Custom Free Tones -->
<h2 class="category-header">Custom Free Tones</h2>
<div class="grid">
  <div class="grid-item"><img src="images/custom1.jpg"><div class="grid-desc">Custom 1</div></div>
  <div class="grid-item"><img src="images/custom2.jpg"><div class="grid-desc">Custom 2</div></div>
</div>
<img class="feature" src="images/custom-feature1.jpg">

<!-- Customer Service Videos (scrollable like TikTok) -->
<h2 class="category-header">Customer Service</h2>
<div class="scroll-video"><video src="videos/cs1.mp4" autoplay muted loop controls></video></div>
<div class="scroll-video"><video src="videos/cs2.mp4" autoplay muted loop controls></video></div>
<div class="scroll-video"><video src="videos/cs3.mp4" autoplay muted loop controls></video></div>
<div class="scroll-video"><video src="videos/cs4.mp4" autoplay muted loop controls></video></div>
<div class="scroll-video"><video src="videos/cs5.mp4" autoplay muted loop controls></video></div>

<footer>
  <div class="payments">
    <img src="payment icons/applepay.png">
    <img src="payment icons/bitcoin.png">
    <img src="payment icons/cashapp.png">
    <img src="payment icons/paypal.png">
    <img src="payment icons/zelle.png">
  </div>
  <a href="index.html" class="more-btn">Back Home</a>
</footer>

</body>
</html>
