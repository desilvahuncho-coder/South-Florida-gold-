<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<title>More of us</title>

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background-image:url("clouds.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.heading{
font-size:34px;
margin-bottom:80px;
}

.masonry{
column-count:3;
column-gap:30px;
}

.masonry video,
.masonry img{
width:100%;
margin-bottom:30px;
border-radius:18px;
object-fit:cover;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
transition:transform .4s ease;
}

.masonry video:hover,
.masonry img:hover{
transform:scale(1.05);
}

.footer{
margin-top:120px;
text-align:center;
}

.footer a{
display:block;
margin:10px;
text-decoration:none;
color:black;
}

@media(max-width:900px){

.masonry{
column-count:1;
}

}

</style>

</head>

<body>

<div class="container">

<div class="heading">
Redefined gold iced out style
</div>

<div class="masonry">

<img src="grill1.jpg">
<img src="grill3.jpg">
<img src="grill4.jpg">

<img src="pic2.jpg">
<img src="pic3.jpg">

<video controls>
<source src="video2.mp4">
</video>

<video controls>
<source src="video3.mp4">
</video>

<video controls>
<source src="video4.mp4">
</video>

<video controls>
<source src="video5.mp4">
</video>

</div>

<div class="footer">

<p>contact us</p>

<a href="tel:+12132823872">+1 (213) 282-3872</a>

<p>instagram and tiktok</p>

<a href="#">southfloridagold1</a>

<p>customer care services monday to saturday 9:30 to 7:00pm</p>

<p>all rights reserved usa</p>

</div>

</div>

</body>

</html>
