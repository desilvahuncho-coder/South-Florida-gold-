<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designs</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('clouds.jpg') no-repeat center top fixed;
  background-size: 100% auto;
  background-color: #f5f2eb;
  text-align: center;
}

.logo {
  width: 180px;
  margin-top: 20px;
}

h1 {
  color: #b8963c;
  letter-spacing: 3px;
  margin-bottom: 5px;
}

.sub {
  color: #b8963c;
  font-size: 12px;
  letter-spacing: 2px;
}

.divider {
  width: 120px;
  height: 2px;
  background: #b8963c;
  margin: 10px auto 20px;
  position: relative;
}

.divider::after {
  content: "◆";
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%);
  color: #b8963c;
  font-size: 12px;
}

.bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: rgba(255,255,255,0.8);
  padding: 10px;
  border-radius: 30px;
  max-width: 600px;
  margin: 20px auto;
}

.bar button {
  border: none;
  background: none;
  color: #b8963c;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 1000px;
  margin: 20px auto;
}

.item {
  aspect-ratio: 1/1;
  overflow: hidden;
  border-radius: 6px;
  box-shadow: 0 5px 20px rgba(184,150,60,0.15);
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.desc {
  font-size: 12px;
  color: #b8963c;
  margin-top: 5px;
}

.small {
  display: flex;
  justify-content: center;
  gap: 12px;
  max-width: 600px;
  margin: 10px auto;
}

.small .item {
  width: 30%;
}

.expand {
  display: none;
  margin: 30px auto;
}

.expand img {
  width: 90%;
  max-width: 500px;
}

.expand p {
  color: #b8963c;
  margin-top: 10px;
}

.services {
  display: none;
  max-width: 700px;
  margin: auto;
}

.services video {
  width: 100%;
  margin-bottom: 10px;
}

.services p {
  color: #b8963c;
  margin-bottom: 15px;
  font-size: 13px;
}

.cta {
  background: linear-gradient(135deg, #0a0a2a, #1a1a40);
  color: #b8963c;
  padding: 50px 20px;
  margin: 40px auto;
  max-width: 900px;
  border-radius: 10px;
}

.features {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 40px auto;
  max-width: 900px;
  color: #b8963c;
}

.features div {
  max-width: 200px;
}

.features h3 {
  font-size: 12px;
}

.features p {
  font-size: 11px;
  opacity: 0.8;
}

.category { display: none; }
.active { display: block; }
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>DESIGNS</h1>
<p class="sub">DISCOVER OUR PREMIUM GOLD DESIGNS</p>
<div class="divider"></div>

<div class="bar">
  <button onclick="show('grills')">GRILLS</button>
  <button onclick="show('chains')">CHAINS</button>
  <button onclick="show('bracelets')">BRACELETS</button>
  <button onclick="show('rings')">RINGS</button>
  <button onclick="show('services')">SERVICES</button>
</div>

<div id="expand" class="expand">
  <img id="expandImg">
  <p id="expandText"></p>
</div>

<!-- KEEP YOUR PRODUCT SECTIONS HERE EXACTLY AS YOU HAD THEM -->

<div class="cta">
  <h2>INQUIRE ABOUT CUSTOM DESIGNS</h2>
</div>

<div class="divider"></div>

<div class="features">
  <div>
    <h3>PREMIUM QUALITY</h3>
    <p>Crafted from the finest gold</p>
  </div>

  <div>
    <h3>SATISFACTION GUARANTEED</h3>
    <p>We stand behind every piece</p>
  </div>

  <div>
    <h3>HANDCRAFTED DESIGNS</h3>
    <p>Unique custom creations</p>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.category, .services').forEach(el=>{
    el.style.display='none';
  });
  document.getElementById(id).style.display='block';
}

function expand(img,text){
  let box = document.getElementById("expand");
  document.getElementById("expandImg").src = img;
  document.getElementById("expandText").innerText = text;
  box.style.display = "block";
  box.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
