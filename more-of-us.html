.container{

.heading{
font-size:36px;

}

.masonry{
column-count:3;
column-gap:30px;
}

.masonry img,
.masonry video{
width:100%;
margin-bottom:30px;
border-radius:18px;
object-fit:cover;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
transition:transform .4s ease, box-shadow .4s ease;
}

.masonry img:hover,
.masonry video:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 30px 60px rgba(0,0,0,0.45);
}

.button{
display:inline-block;
padding:16px 28px;
background:linear-gradient(135deg,#d4af37,#f2d47a);
color:#1a1a1a;
font-weight:700;
text-decoration:none;
border-radius:8px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.footer{
margin-top:120px;
text-align:center;
font-size:18px;
line-height:1.7;
}

.footer a{
display:block;
margin-top:10px;
text-decoration:none;
color:#1a1a1a;
}

@media(max-width:900px){

.masonry{
column-count:1;
}

}
