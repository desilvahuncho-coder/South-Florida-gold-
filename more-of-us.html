<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Of Us | South Florida Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('clouds.jpg') center/cover no-repeat;
  color:#1a1a1a;
}
.container{max-width:1100px;margin:auto;padding:20px;}

/* LIVE SUPPORT STRIP */
.live-support{
  background:#007BFF;
  color:white;
  text-align:center;
  font-size:12px;
  padding:5px 0;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:100;
  text-align:center;
  padding:15px 0;
  font-family:'Playfair Display',serif;
  font-size:36px;
  color:skyblue;
  background:white;
  font-weight:bold;
}

/* VIDEOS FEED */
.feed{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
  padding:50px 0;
}
.feed video{
  width:90%;
  max-width:700px;
  border-radius:10px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

/* VIDEO CONTROLS BUTTON */
.video-controls{
  text-align:center;
  margin-bottom:20px;
}
.control-button{
  padding:10px 20px;
  margin:0 5px;
  background:linear-gradient(135deg,#d4af37,#f2d47a);
  border:none;
  border-radius:8px;
  font-weight:700;
