<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - South Florida Gold</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('clouds-background.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #f0f0f0;
  text-align: center;
  z-index: 1000;
}

.header-bar {
  background: #ccc;
  padding: 5px;
  font-size: 14px;
}

.brand {
  font-size: 36px;
  color: #5DADE2;
  text-shadow: 1px 1px 2px #000;
}

.karats {
  color: black;
  margin-bottom: 10px;
}

.nav a {
  background: black;
  color: white;
  padding: 6px 12px;
  margin: 5px;
  text-decoration: none;
  font-size: 14px;
}

/* SECTIONS */
.section {
  max-width: 1100px;
  margin: 40px auto;
  text-align: center;
}

.section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 2px;
  background: gold;
  margin: 10px auto;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

/* MEDIA */
.grid img, .grid video {
  width: 100%;
  display: block;
}

/* FEATURE */
.feature {
  margin: 15px 0;
}

.feature video, .feature img {
  width: 100%;
  max-width: 700px;
}

/* MOBILE */
@media(max-width:600px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
