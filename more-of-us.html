<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>More of Us – South Florida Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: url('clouds.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #333;
}
header {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.85);
    text-align: center;
    font-size: 34px;
    color: skyblue;
    padding: 20px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
header.scrolled { background: rgba(255,255,255,1); padding: 15px; }

section {
    padding: 70px 20px;
    text-align: center;
}

h2 { font-size: 36px; letter-spacing: 2px; margin-bottom: 40px; }

.contact-info {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    max-width: 1000px;
    margin: auto;
    gap: 30px;
}

.contact-card {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 10px;
    max-width: 250px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.contact-card h3 {
    margin-bottom: 15px;
    color: gold;
}

.contact-card p, .contact-card a {
    margin: 5px 0;
    color: #333;
    font-size: 14px;
    text-decoration: none;
}

.contact-card a:hover { color: skyblue; }

footer {
    background: white;
    border-top: 2px solid gold;
    padding: 20px;
    text-align: center;
    font-size: 14px;
}
</style>
</head>
<body>

<header>South Florida Gold</header>

<section class="fade-in">
  <h2>More of Us</h2>
  <div class="contact-info">
    <div class="contact-card">
      <h3>Address</h3>
      <p>11502 N Nebraska Ave, Tampa, FL</p>
    </div>
    <div class="contact-card">
      <h3>Hours</h3>
      <p>Mon–Sat: 10am–7pm</p>
      <p>Sun: Closed</p>
    </div>
    <div class="contact-card">
      <h3>WhatsApp</h3>
      <a href="https://wa.me/11234567890" target="_blank">Chat With Us</a>
    </div>
    <div class="contact-card">
      <h3>Socials & Payments</h3>
      <p>Instagram | Facebook | TikTok</p>
      <p>Visa | Mastercard | PayPal</p>
    </div>
  </div>
</section>

<footer>
  &copy; 2026 South Florida Gold
</footer>

<script>
// Fade-in scroll
const fadeEls = document.querySelectorAll('.fade-in');
window.addEventListener('scroll', () => {
    fadeEls.forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('visible');
    });
});

// Header scroll effect
window.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if(window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
});
</script>

</body>
</html>
