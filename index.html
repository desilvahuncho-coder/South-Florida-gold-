<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Florida Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
/* GLOBAL */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('clouds.jpg') center/cover no-repeat;
  color:#1a1a1a;
}
.container{max-width:1100px;margin:auto;padding:20px;}

/* HEADER */
.top-strip{
  background:#007BFF;
  color:white;
  text-align:center;
  font-size:12px;
  padding:5px 0;
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:white;
  text-align:center;
  padding:20px 0;
  font-family:'Playfair Display',serif;
  font-size:36px;
  color:#87CEEB;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}
.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORY */
section{
  padding:70px 0;
}
.category-title{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:10px;
}
.gold-line{
  width:80px;
  height:1px;
  background:#d4af37;
  margin:12px auto 20px auto;
}
.category-desc{
  text-align:center;
  font-size:13px;
  opacity:0.8;
  margin-bottom:30px;
  line-height:1.3;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-bottom:30px;
}
.grid img{
  width:100%;
  border-radius:10px;
  display:block;
  transition:transform 0.6s ease, filter 0.6s ease;
}
.grid img:hover{
  transform:scale(1.05);
  filter:brightness(1.1);
}
.grid p{
  text-align:center;
  font-size:12px;
  color:#d4af37;
  margin-top:6px;
  letter-spacing:1px;
}

/* FEATURE IMAGE */
.feature{
  margin-top:20px;
}
.feature img{
  width:100%;
  border-radius:10px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow:hidden;
  gap:16px;
  scroll-behavior:smooth;
}
.carousel-item{
  min-width:100%;
  flex-shrink:0;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  margin:70px 0 40px 0;
}
.more-button, .whatsapp-button{
  display:inline-block;
