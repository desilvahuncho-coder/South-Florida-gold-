<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Florida Gold</title>
<style>
/* 1. Body & Background */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('clouds.jpg') no-repeat center center fixed;
  background-size: cover;
}
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  pointer-events:none;
  z-index:0;
}

/* 2. Sticky Header */
.sticky-header{
  position:sticky;
  top:0;
  width:100%;
  text-align:center;
  background:rgba(255,255,255,0.95);
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  backdrop-filter: blur(6px);
  z-index:100;
  padding:15px 0;
}
.sticky-header h1{
  color: skyblue;
  font-size: 34px;
  margin:0;
}
.sticky-header p{
  font-size:14px;
  opacity:0.7;
  margin:5px 0 0 0;
}

/* 3. Hero Video */
.hero video{
  width:100%;
  height:100vh;
  object-fit:cover;
}

/* 4. Video Strip */
.video-strip{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
  scroll-snap-type: x mandatory;
  scroll-behavior:smooth;
}
.video-item{
  flex:0 0 auto;
  width:260px;
  scroll-snap-align:start;
  transition: transform 0.4s ease;
}
.video-item video{
  width:100%;
  max-height:350px;
  object-fit:contain;
}
.video-item:hover video{
  transform:scale(1.05);
}

/* 5. Primary Category Grid */
.primary-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
  align-items:start;
  padding:0 20px;
}
.primary-grid img{
  width:100%;
  object-fit:cover;
}
.small-images{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:15px;
}

/* 6. Secondary Grids */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:0 20px;
}
.grid img{
  width:100%;
  object-fit:cover;
  display:block;
  transition: transform 0.4s ease;
}
.grid img:hover{
  transform:scale(1.03);
}

/* 7. Feature Images */
.feature{
  margin:40px 0;
}
.feature img{
  width:100%;
  max-height:520px;
  object-fit:contain;
  transition: transform 0.4s ease;
}
.feature img:hover{
  transform:scale(1.02);
}

/* 8. Section Spacing & Titles */
section{
  padding:70px 0;
}
.secondary-section h2{
  text-align:center;
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:20px;
  opacity:0.9;
}
.secondary-section p{
  text-align:center;
  opacity:0.7;
  font-size:13px;
}

/* 9. Smooth scrolling */
html{
  scroll-behavior:smooth;
}
</style>
</head>
<body>

<!-- Sticky Header -->
<header class="sticky-header">
  <h1>South Florida Gold</h1>
  <p>14K + 18K + 22K</p>
</header>

<!-- Hero Section -->
<section class="hero">
  <video src="cs1.mp4" autoplay muted loop playsinline></video>
</section>

<!-- Video Strip -->
<section class="video-strip">
  <div class="video-item"><video src="cs1.mp4" muted loop playsinline></video></div>
  <div class="video-item"><video src="cs2.mp4" muted loop playsinline></video></div>
  <div class="video-item"><video src="cs3.mp4" muted loop playsinline></video></div>
</section>

<!-- Primary Category: Cuban Suite -->
<section class="primary-section">
  <div class="grid primary-grid">
    <img src="cubam-chain1.jpg" alt="Big Cuban">
    <div class="small-images">
      <img src="cubam-chain2.jpg" alt="Small Cuban 1">
      <img src="cubam-chain3.jpg" alt="Small Cuban 2">
    </div>
  </div>
</section>

<!-- Feature Image -->
<section class="feature">
  <img src="feature1.jpg" alt="Feature Image">
</section>

<!-- Secondary Categories -->
<section class="secondary-section">
  <h2>Grills</h2>
  <div class="grid">
    <img src="grill1.jpg" alt="">
    <img src="grill2.jpg" alt="">
    <img src="grill3.jpg" alt="">
    <img src="grill4.jpg" alt="">
  </div>
</section>

<section class="secondary-section">
  <h2>Iced Out</h2>
  <div class="grid">
    <img src="iced1.jpg" alt="">
    <img src="iced2.jpg" alt="">
    <img src="iced3.jpg" alt="">
    <img src="iced4.jpg" alt="">
  </div>
</section>

<section class="secondary-section">
  <h2>Custom Free Tones</h2>
  <div class="grid">
    <img src="custom1.jpg" alt="">
    <img src="custom2.jpg" alt="">
    <img src="custom3.jpg" alt="">
    <img src="custom4.jpg" alt="">
  </div>
</section>

</body>
</html>
