<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<title>South Florida Gold</title>

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background-image: url("clouds.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #1a1a1a;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
}

.section {
  margin-top: 80px;
  margin-bottom: 80px;
}

h1, h2 {
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 24px;
}

.hero video {
  width: 100%;
  height: 75vh;
  object-fit: cover;
  border-radius: 14px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
}

.text-block {
  max-width: 720px;
  margin: 40px auto;
  text-align: center;
  font-size: 20px;
  line-height: 1.6;
}

.split {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 40px;
  margin-top: 40px;
}

.media {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.media:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
}

.masonry {
  column-count: 3;
  column-gap: 30px;
  margin-top: 60px;
}

.masonry .product {
  break-inside: avoid;
  margin-bottom: 40px;
}

.masonry img,
.masonry video {
  width: 100%;
  border-radius: 16px;
  object-fit: cover;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.masonry img:hover,
.masonry video:hover {
  transform: scale(1.04);
}
