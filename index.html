<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Florida Gold</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Arial', sans-serif; background:white; color:black; line-height:1.6; }

header { text-align:center; padding:20px; font-size:clamp(24px,4vw,36px); font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#222; border-bottom:3px solid black; }

.hero { position:relative; width:100%; max-height:600px; overflow:hidden; margin:20px 0; }
.hero video { width:100%; height:auto; display:block; object-fit:cover; border-radius:16px; }

.gallery { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin:20px 0; }
.gallery-item { flex:1 1 250px; max-width:300px; border-radius:16px; overflow:hidden; }
.gallery-item img { width:100%; display:block; object-fit:cover; border-radius:16px; }

.button { display:inline-block; margin:20px auto; padding:12px 24px; background:black; color:white; text-decoration:none; font-weight:bold; border-radius:8px; text-align:center; }

footer { text-align:center; padding:40px; border-top:1px solid black; font-size:16px; }
footer a { text-decoration:none; color:black; font-weight:bold; }
</style>
</head>
<body>

<header>
  <img src="gallery/logo.png" alt="South Florida Gold Logo" style="max-width:200px; margin-bottom:20px;">
</header>

<div class="hero">
  <video controls src="gallery/hero.mp4"></video>
</div>

<div class="gallery">
  <div class="gallery-item"><img src="gallery/grill1.jpg" alt="Grill 1"></div>
  <div class="gallery-item"><img src="gallery/grill2.jpg" alt="Grill 2"></div>
  <div class="gallery-item"><img src="gallery/cuban-ring.jpg" alt="Custom Cuban Link"></div>
</div>

<a href="more.html" class="button">More of Us</a>

<footer>
  <p>+1 (213) 282-3872</p>
  <p>Instagram: Southfloridagold1</p>
  <p>TikTok: Southfloridagold1</p>
</footer>

</body>
</html>
